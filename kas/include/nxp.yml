header:
  version: 14

repos:
  meta-freescale:
    url: https://github.com/Freescale/meta-freescale.git
    commit: 2f83b211beff98d84632b186691ca1ffda34fa6c
  meta-freescale-3rdparty:
    url: https://github.com/Freescale/meta-freescale-3rdparty.git
    commit: 48516272d97f9415e0ee3ab54a923e4c40143e69
  meta-freescale-distro:
    url: https://github.com/Freescale/meta-freescale-distro.git
    commit: d5bbb487b2816dfc74984a78b67f7361ce404253

  meta-mender-community:
    layers:
      meta-mender-nxp:

distro: fslc-framebuffer

local_conf_header:
  nxp: |
    ACCEPT_FSL_EULA = "1"
    MENDER_BOOT_PART_SIZE_MB = "64"
    MENDER_STORAGE_TOTAL_SIZE_MB = "4096"
    IMAGE_INSTALL:append = " kernel-image kernel-devicetree"
    IMAGE_FSTYPES:remove = " rpi-sdimg"
    MENDER_FEATURES_ENABLE:append = " mender-uboot mender-image-sd"
    MENDER_FEATURES_DISABLE:append = " mender-grub mender-image-uefi"